<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KD Dashboard | Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0d2542; --accent: #f1c40f; --bg: #f8fafc; --sidebar-w: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); display: flex; }

        /* Sidebar Sidebar */
        .sidebar { width: var(--sidebar-w); background: var(--primary); height: 100vh; position: fixed; color: white; padding: 40px 20px; display: flex; flex-direction: column; }
        .side-logo { width: 85px; height: 85px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--primary); font-size: 30px; margin: 0 auto 50px; border: 4px solid rgba(255,255,255,0.1); }
        
        .nav-link { padding: 15px 20px; border-radius: 15px; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-link.active { background: var(--accent); color: var(--primary); }

        /* Main Content area */
        .main-view { margin-left: var(--sidebar-w); flex: 1; padding: 40px; }
        .tab-view { display: none; }
        .tab-view.active { display: block; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-top: 20px; }
        .stat-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .stat-card span { font-size: 13px; color: #777; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card h2 { font-size: 32px; color: var(--primary); margin-top: 10px; font-weight: 800; }

        /* Request Table */
        .table-card { background: white; border-radius: 25px; padding: 25px; margin-top: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: #999; font-size: 12px; text-transform: uppercase; border-bottom: 2px solid #f8fafc; }
        td { padding: 18px 15px; font-size: 14px; font-weight: 600; color: var(--primary); border-bottom: 1px solid #f8fafc; }
        
        .btn-act { padding: 8px 15px; border-radius: 10px; border: none; font-weight: 700; font-size: 12px; cursor: pointer; }
        .btn-approve { background: #dcfce7; color: #166534; }
        .btn-reject { background: #fee2e2; color: #991b1b; margin-left: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-logo">KD</div>
    <div class="nav-link active" onclick="switchTab('dashboard', this)"><i class="fa-solid fa-grid-2"></i> Dashboard</div>
    <div class="nav-link" onclick="switchTab('deposits', this)"><i class="fa-solid fa-arrow-down-long"></i> Deposits</div>
    <div class="nav-link" onclick="switchTab('withdrawals', this)"><i class="fa-solid fa-arrow-up-long"></i> Withdrawals</div>
    <div class="nav-link" style="margin-top: auto; color: #ff7675;" onclick="adminLogout()"><i class="fa-solid fa-power-off"></i> Sign Out</div>
</div>

<div class="main-view">
    <div id="dashboard" class="tab-view active">
        <h1 style="color: var(--primary); font-weight: 800;">Overview</h1>
        <div class="stats-grid">
            <div class="stat-card"><span>Active Users</span><h2 id="total-users">0</h2></div>
            <div class="stat-card"><span>Total Deposits</span><h2 id="total-dep">₹0</h2></div>
            <div class="stat-card"><span>Pending Requests</span><h2 id="total-pending">0</h2></div>
        </div>
    </div>

    <div id="deposits" class="tab-view">
        <h1 style="color: var(--primary); font-weight: 800;">Deposit Requests</h1>
        <div class="table-card">
            <table>
                <thead><tr><th>User ID</th><th>Amount</th><th>UTR Number</th><th>Action</th></tr></thead>
                <tbody id="dep-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="withdrawals" class="tab-view">
        <h1 style="color: var(--primary); font-weight: 800;">Withdrawal Requests</h1>
        <div class="table-card">
            <table>
                <thead><tr><th>User ID</th><th>Amount</th><th>Details</th><th>Action</th></tr></thead>
                <tbody id="with-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBPpHeQPokChMANXIy78BpT8DAGZQiGPw",
        authDomain: "win-ad891.firebaseapp.com",
        projectId: "win-ad891",
        storageBucket: "win-ad891.firebasestorage.app",
        messagingSenderId: "777370829193",
        appId: "1:777370829193:web:58af7368078591e6806158"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // SECURITY CHECK: Agar login nahi hai toh wapas bhej do
    onAuthStateChanged(auth, (user) => {
        if (!user || user.email !== "adminkd@gmail.com") {
            window.location.href = "admin-login.html";
        }
    });

    window.switchTab = (tabId, el) => {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    };

    // --- Stats Load ---
    onSnapshot(collection(db, "users"), snap => document.getElementById('total-users').innerText = snap.size);

    // --- Realtime Deposits Load ---
    onSnapshot(query(collection(db, "deposits"), where("status", "==", "Pending")), snap => {
        const body = document.getElementById('dep-table-body');
        body.innerHTML = "";
        document.getElementById('total-pending').innerText = snap.size;
        snap.forEach(d => {
            const row = d.data();
            body.innerHTML += `<tr>
                <td>${row.uid.substring(0,8)}</td>
                <td>₹${row.amount}</td>
                <td>${row.utr}</td>
                <td>
                    <button class="btn-act btn-approve" onclick="approveDep('${d.id}', '${row.uid}', ${row.amount})">APPROVE</button>
                    <button class="btn-act btn-reject">REJECT</button>
                </td>
            </tr>`;
        });
    });

    // --- APPROVE LOGIC ---
    window.approveDep = async (docId, uid, amt) => {
        if(!confirm("Kore you sure? Paisa add ho jayega.")) return;
        try {
            await updateDoc(doc(db, "users", uid), { balance: increment(amt) });
            await updateDoc(doc(db, "deposits", docId), { status: "Approved" });
            alert("Balance Updated Successfully!");
        } catch(e) { alert(e.message); }
    };

    window.adminLogout = () => { signOut(auth); window.location.href = "admin-login.html"; };
</script>
</body>
</html>
