<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KD Admin | Master Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0d2542; --accent: #f1c40f; --bg: #f4f7f6; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--primary); }

        /* Sidebar & Layout */
        .sidebar { width: 260px; background: var(--primary); height: 100vh; position: fixed; color: white; padding: 30px 20px; display: flex; flex-direction: column; z-index: 1000; }
        .side-logo { width: 70px; height: 70px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: var(--primary); font-size: 26px; margin: 0 auto 40px; border: 3px solid rgba(255,255,255,0.2); }
        .nav-link { padding: 14px 18px; border-radius: 12px; color: rgba(255,255,255,0.7); cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-weight: 600; transition: 0.3s; }
        .nav-link.active { background: var(--accent); color: var(--primary); }
        .main-view { margin-left: 260px; width: calc(100% - 260px); padding: 30px; }

        /* Stats & Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border-bottom: 4px solid var(--accent); }
        .stat-card span { font-size: 11px; color: #777; font-weight: 700; text-transform: uppercase; }
        .stat-card h2 { font-size: 24px; font-weight: 800; margin-top: 5px; }

        /* Tables */
        .table-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #f4f7f6; }
        td { padding: 14px 12px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #f4f7f6; }

        /* Buttons & Badges */
        .btn-act { padding: 7px 12px; border-radius: 8px; border: none; font-weight: 700; font-size: 11px; cursor: pointer; color: white; }
        .pay-details-box { background: #fdf9e7; padding: 10px; border-radius: 8px; font-size: 11px; border-left: 4px solid #f1c40f; line-height: 1.6; color: #333; }
        .tab-view { display: none; }
        .tab-view.active { display: block; }

        @media (max-width: 768px) { .sidebar { display: none; } .main-view { margin-left: 0; width: 100%; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-logo">KD</div>
    <div class="nav-link active" onclick="switchTab('dashboard', this)"><i class="fa-solid fa-house"></i> Dashboard</div>
    <div class="nav-link" onclick="switchTab('users-list', this)"><i class="fa-solid fa-users"></i> All Users</div>
    <div class="nav-link" onclick="switchTab('deposits', this)"><i class="fa-solid fa-plus-circle"></i> Deposits</div>
    <div class="nav-link" onclick="switchTab('withdrawals', this)"><i class="fa-solid fa-minus-circle"></i> Withdrawals</div>
    <div class="nav-link" style="margin-top: auto; color: #ff7675;" onclick="adminLogout()"><i class="fa-solid fa-power-off"></i> Logout</div>
</div>

<div class="main-view">
    <div id="dashboard" class="tab-view active">
        <h1>Dashboard Overview</h1>
        <div class="stats-grid">
            <div class="stat-card"><span>Total Users</span><h2 id="total-users">0</h2></div>
            <div class="stat-card"><span>Total Deposits</span><h2 id="total-dep-sum">₹0</h2></div>
            <div class="stat-card"><span>Pending Requests</span><h2 id="total-pending">0</h2></div>
        </div>
    </div>

    <div id="users-list" class="tab-view">
        <h1>Registered Users</h1>
        <div class="table-card">
            <table>
                <thead><tr><th>User ID</th><th>Contact</th><th>Balance</th><th>Action</th></tr></thead>
                <tbody id="users-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="deposits" class="tab-view">
        <h1>Deposit Requests</h1>
        <div class="table-card">
            <table>
                <thead><tr><th>User ID</th><th>Amount</th><th>UTR/Ref</th><th>Action</th></tr></thead>
                <tbody id="dep-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="withdrawals" class="tab-view">
        <h1>Withdrawal Requests</h1>
        <div class="table-card">
            <table>
                <thead><tr><th>User ID</th><th>Amount</th><th>Payment Details</th><th>Action</th></tr></thead>
                <tbody id="with-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, query, where, writeBatch, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBPpHeQPokChMANXIy78BpT8DAGZQiGPw",
        authDomain: "win-ad891.firebaseapp.com",
        projectId: "win-ad891",
        storageBucket: "win-ad891.firebasestorage.app",
        messagingSenderId: "777370829193",
        appId: "1:777370829193:web:58af7368078591e6806158"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.switchTab = (tabId, el) => {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    };

    // 1. DASHBOARD & USERS LOGIC
    onSnapshot(collection(db, "users"), snap => {
        document.getElementById('total-users').innerText = snap.size;
        const body = document.getElementById('users-table-body');
        body.innerHTML = "";
        snap.forEach(u => {
            const d = u.data();
            body.innerHTML += `<tr><td>${u.id.substring(0,6)}</td><td>${d.email || d.phone || 'N/A'}</td><td>₹${d.balance || 0}</td><td><button class="btn-act" style="background:#3498db">VIEW</button></td></tr>`;
        });
    });

    // 2. DEPOSIT APPROVAL (ADD BALANCE)
    onSnapshot(query(collection(db, "deposits"), where("status", "==", "Pending")), snap => {
        const body = document.getElementById('dep-table-body');
        body.innerHTML = "";
        let depTotal = 0;
        snap.forEach(d => {
            const r = d.data();
            body.innerHTML += `<tr><td>${r.uid.substring(0,6)}</td><td>₹${r.amount}</td><td>${r.utr}</td><td>
                <button class="btn-act" style="background:#27ae60" onclick="approveDep('${d.id}','${r.uid}',${r.amount})">ADD</button>
                <button class="btn-act" style="background:#e74c3c" onclick="rejectReq('deposits','${d.id}')">REJECT</button>
            </td></tr>`;
        });
    });

    window.approveDep = async (id, uid, amt) => {
        const batch = writeBatch(db);
        batch.update(doc(db, "users", uid), { balance: increment(amt) });
        batch.update(doc(db, "deposits", id), { status: "Approved" });
        await batch.commit();
        alert("Deposit Approved!");
    };

    // 3. WITHDRAWAL PROCESSING (MATCHING withdraw.html)
    onSnapshot(query(collection(db, "withdrawals"), where("status", "==", "Pending")), snap => {
        const body = document.getElementById('with-table-body');
        body.innerHTML = "";
        document.getElementById('total-pending').innerText = snap.size;
        
        snap.forEach(d => {
            const row = d.data();
            const details = row.details || {}; // 'details' object ko access kar rahe hain
            let displayDetails = "";

            if(row.method === "upi") {
                displayDetails = `<b>UPI:</b> ${details.upi || 'N/A'}`;
            } else {
                // withdraw.html ke keys: name, acc, ifsc
                displayDetails = `<b>Holder:</b> ${details.name || 'N/A'}<br>
                                  <b>A/C:</b> ${details.acc || 'N/A'}<br>
                                  <b>IFSC:</b> ${details.ifsc || 'N/A'}`;
            }

            body.innerHTML += `<tr>
                <td>${row.uid ? row.uid.substring(0,6) : 'N/A'}</td>
                <td>₹${row.amount}</td>
                <td><div class="pay-details-box">${displayDetails}</div></td>
                <td>
                    <button class="btn-act" style="background:#27ae60" onclick="actionWith('${d.id}','Success')">DONE</button>
                    <button class="btn-act" style="background:#e74c3c" onclick="actionWith('${d.id}','Rejected','${row.uid}',${row.amount})">REJECT</button>
                </td>
            </tr>`;
        });
    });

    window.actionWith = async (id, stat, uid=null, amt=0) => {
        const batch = writeBatch(db);
        batch.update(doc(db, "withdrawals", id), { status: stat });
        // Agar Reject hua toh balance user ko wapas milega
        if(stat === 'Rejected' && uid) batch.update(doc(db, "users", uid), { balance: increment(amt) });
        await batch.commit();
        alert("Withdrawal Updated!");
    };

    window.rejectReq = async (coll, id) => {
        await updateDoc(doc(db, coll, id), { status: "Rejected" });
        alert("Rejected!");
    };

    window.adminLogout = () => { signOut(auth); window.location.href="adminlogin.html"; };
</script>
</body>
</html>
