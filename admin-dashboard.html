<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KD Admin | Responsive</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0d2542; --accent: #f1c40f; --bg: #f4f7f6; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--primary); }

        /* Sidebar - Desktop & Tablet */
        .sidebar { 
            width: 260px; background: var(--primary); height: 100vh; position: fixed; 
            color: white; padding: 30px 20px; display: flex; flex-direction: column; 
            transition: 0.3s; z-index: 1000; 
        }
        
        /* Mobile Navigation Bottom Bar */
        .mobile-nav { 
            display: none; position: fixed; bottom: 0; width: 100%; 
            background: var(--primary); justify-content: space-around; 
            padding: 12px 0; z-index: 1001; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
        }
        .mobile-nav div { color: rgba(255,255,255,0.6); text-align: center; font-size: 10px; cursor: pointer; }
        .mobile-nav div i { font-size: 20px; display: block; margin-bottom: 4px; }
        .mobile-nav div.active { color: var(--accent); }

        .side-logo { 
            width: 70px; height: 70px; background: var(--accent); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: var(--primary); font-size: 26px; 
            margin: 0 auto 40px; border: 3px solid rgba(255,255,255,0.2); 
        }
        
        .nav-link { 
            padding: 14px 18px; border-radius: 12px; color: rgba(255,255,255,0.7); 
            cursor: pointer; display: flex; align-items: center; gap: 12px; 
            margin-bottom: 8px; font-weight: 600; transition: 0.3s; 
        }
        .nav-link.active { background: var(--accent); color: var(--primary); }

        /* Main Content area */
        .main-view { margin-left: 260px; width: calc(100% - 260px); padding: 30px; transition: 0.3s; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); border-bottom: 4px solid var(--accent);
        }
        .stat-card span { font-size: 11px; color: #777; font-weight: 700; text-transform: uppercase; }
        .stat-card h2 { font-size: 24px; font-weight: 800; margin-top: 5px; }

        /* Table Responsiveness */
        .table-card { 
            background: white; border-radius: 20px; padding: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); overflow-x: auto; 
        }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; padding: 12px; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #f4f7f6; }
        td { padding: 14px 12px; font-size: 13px; font-weight: 600; border-bottom: 1px solid #f4f7f6; }
        
        .btn-act { padding: 7px 12px; border-radius: 8px; border: none; font-weight: 700; font-size: 11px; cursor: pointer; }
        .btn-approve { background: #27ae60; color: white; }
        .btn-reject { background: #e74c3c; color: white; margin-left: 4px; }

        .tab-view { display: none; }
        .tab-view.active { display: block; }

        /* Mobile View Styles */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
            .main-view { margin-left: 0; width: 100%; padding: 20px; padding-bottom: 100px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-logo">KD</div>
    <div class="nav-link active" onclick="switchTab('dashboard', this)"><i class="fa-solid fa-house"></i> Dashboard</div>
    <div class="nav-link" onclick="switchTab('deposits', this)"><i class="fa-solid fa-plus-circle"></i> Deposits</div>
    <div class="nav-link" onclick="switchTab('withdrawals', this)"><i class="fa-solid fa-minus-circle"></i> Withdrawals</div>
    <div class="nav-link" style="margin-top: auto; color: #ff7675;" onclick="adminLogout()"><i class="fa-solid fa-power-off"></i> Logout</div>
</div>

<nav class="mobile-nav">
    <div class="m-link active" onclick="switchTab('dashboard', this)"><i class="fa-solid fa-house"></i>Home</div>
    <div class="m-link" onclick="switchTab('deposits', this)"><i class="fa-solid fa-plus-circle"></i>Deposit</div>
    <div class="m-link" onclick="switchTab('withdrawals', this)"><i class="fa-solid fa-minus-circle"></i>Withdraw</div>
    <div class="m-link" onclick="adminLogout()"><i class="fa-solid fa-power-off"></i>Exit</div>
</nav>

<div class="main-view">
    <div id="dashboard" class="tab-view active">
        <h1 style="margin-bottom: 20px;">Admin Overview</h1>
        <div class="stats-grid">
            <div class="stat-card"><span>Total Members</span><h2 id="total-users">0</h2></div>
            <div class="stat-card"><span>Total Deposits</span><h2 id="total-dep-sum">₹0</h2></div>
            <div class="stat-card"><span>Pending Requests</span><h2 id="total-pending">0</h2></div>
        </div>
    </div>

    <div id="deposits" class="tab-view">
        <h1 style="margin-bottom: 20px;">Deposit Approval</h1>
        <div class="table-card">
            <table>
                <thead><tr><th>User ID</th><th>Amount</th><th>UTR/Ref</th><th>Action</th></tr></thead>
                <tbody id="dep-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="withdrawals" class="tab-view">
        <h1 style="margin-bottom: 20px;">Withdrawal Requests</h1>
        <div class="table-card">
            <table>
                <thead><tr><th>User ID</th><th>Amount</th><th>Method</th><th>Action</th></tr></thead>
                <tbody id="with-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBPpHeQPokChMANXIy78BpT8DAGZQiGPw",
        authDomain: "win-ad891.firebaseapp.com",
        projectId: "win-ad891",
        storageBucket: "win-ad891.firebasestorage.app",
        messagingSenderId: "777370829193",
        appId: "1:777370829193:web:58af7368078591e6806158"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (!user || user.email !== "adminkd@gmail.com") window.location.href = "adminlogin.html";
    });

    window.switchTab = (tabId, el) => {
        document.querySelectorAll('.tab-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-link, .m-link').forEach(l => l.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    };

    // --- REALTIME DATA ---
    onSnapshot(collection(db, "users"), snap => {
        document.getElementById('total-users').innerText = snap.size;
    });

    onSnapshot(query(collection(db, "deposits"), where("status", "==", "Pending")), snap => {
        const body = document.getElementById('dep-table-body');
        body.innerHTML = "";
        document.getElementById('total-pending').innerText = snap.size;
        snap.forEach(d => {
            const row = d.data();
            body.innerHTML += `<tr>
                <td>${row.uid.substring(0,6)}..</td>
                <td>₹${row.amount}</td>
                <td>${row.utr}</td>
                <td>
                    <button class="btn-act btn-approve" onclick="approveDep('${d.id}', '${row.uid}', ${row.amount})">ADD</button>
                </td>
            </tr>`;
        });
    });

    // Withdrawal display logic (basic)
    onSnapshot(query(collection(db, "withdrawals"), where("status", "==", "Pending")), snap => {
        const body = document.getElementById('with-table-body');
        body.innerHTML = "";
        snap.forEach(d => {
            const row = d.data();
            body.innerHTML += `<tr>
                <td>${row.uid.substring(0,6)}..</td>
                <td>₹${row.amount}</td>
                <td>${row.method}</td>
                <td><button class="btn-act btn-reject">DONE</button></td>
            </tr>`;
        });
    });

    window.approveDep = async (docId, uid, amt) => {
        if(!confirm("Verify UTR? Confirm to add balance.")) return;
        try {
            await updateDoc(doc(db, "users", uid), { balance: increment(amt) });
            await updateDoc(doc(db, "deposits", docId), { status: "Approved" });
            alert("Success!");
        } catch(e) { alert(e.message); }
    };

    window.adminLogout = () => { signOut(auth); window.location.href = "adminlogin.html"; };
</script>
</body>
</html>
