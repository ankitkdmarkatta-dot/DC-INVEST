<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | DC INVEST</title>
    <style>
        /* --- DESIGN VARIABLES & STYLES (wahi same jo pehle the) --- */
        :root {
            --primary: #0d2542;
            --accent: #f1c40f;
            --bg-gradient: linear-gradient(135deg, #0d2542 0%, #1a4a80 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-card {
            background: var(--glass-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeInScale 0.8s ease-out;
            position: relative;
        }

        /* --- SUCCESS MESSAGE STYLING (naya add kiya hai) --- */
        #success-msg {
            display: none; /* shuru mein chhupa hua */
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: #27ae60;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            animation: fadeInScale 0.4s ease-out;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            position: relative;
            padding: 5px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent), transparent, var(--accent));
            animation: rotateBorder 4s linear infinite;
        }

        .logo-inner {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #eee;
        }

        .logo-inner img {
            width: 80%;
            height: auto;
            animation: pulse 2s ease-in-out infinite;
        }

        h2 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 26px;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 5px;
            margin-left: 5px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
            font-size: 15px;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(13, 37, 66, 0.1);
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-signup:hover {
            background: #1a4a80;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .login-link {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: var(--primary);
            font-weight: bold;
            text-decoration: none;
        }

        /* --- ANIMATIONS --- */
        @keyframes rotateBorder {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @media (max-width: 480px) {
            .signup-card {
                padding: 30px 20px;
            }
            h2 { font-size: 22px; }
            input { padding: 10px; }
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <div id="success-msg">Account created successfully! Redirecting to login...</div>

        <div class="logo-container">
            <div class="logo-inner">
                <img src="logo.png" alt="DC" onerror="this.parentElement.innerHTML='<b>DC</b>'">
            </div>
        </div>

        <h2>Create Account</h2>
        <p class="subtitle">Join DC INVEST & Start Growing Wealth</p>

        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="email@example.com" id="signup-email" required>
            </div>

            <div class="form-group">
                <label>Create Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-signup">Sign Up Now</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signup-form');
        const successMsg = document.getElementById('success-msg');

        signupForm.addEventListener('submit', function(event) {
            event.preventDefault(); // page reload hone se rokega

            // Success message dikhayega
            successMsg.style.display = 'block';
            signupForm.style.opacity = '0.3'; // form ko halka kar dega
            
            // 2 second baad login page pe redirect karega
            setTimeout(function() {
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>

</body>
</html>
