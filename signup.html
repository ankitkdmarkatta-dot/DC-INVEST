<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | DC INVEST</title>
    <style>
        :root {
            --primary: #0d2542;
            --accent: #f1c40f;
            --bg-gradient: linear-gradient(135deg, #0d2542 0%, #1a4a80 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-card {
            background: var(--glass-bg);
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeInScale 0.8s ease-out;
            position: relative;
        }

        #status-msg {
            display: none;
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 10;
        }

        .success { background: #27ae60; color: white; }
        .error { background: #e74c3c; color: white; }

        .logo-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
            padding: 5px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent), transparent, var(--accent));
            animation: rotateBorder 4s linear infinite;
        }

        .logo-inner {
            width: 100%; height: 100%;
            background: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        h2 { color: var(--primary); margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--primary); margin: 0 0 5px 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #e1e1e1; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }

        .btn-signup {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .btn-signup:disabled { background: #ccc; cursor: not-allowed; }

        .login-link { margin-top: 20px; font-size: 14px; color: #666; }
        .login-link a { color: var(--primary); font-weight: bold; text-decoration: none; }

        @keyframes rotateBorder { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="signup-card">
        <div id="status-msg"></div>

        <div class="logo-container">
            <div class="logo-inner"><b>DC</b></div>
        </div>

        <h2>Create Account</h2>
        <p class="subtitle">Join DC INVEST & Start Growing Wealth</p>

        <form id="signup-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="user-name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="signup-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-signup" id="submit-btn">Sign Up Now</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBPpHeQPokChMANXIy78BpT8DAGZQiGPw",
            authDomain: "win-ad891.firebaseapp.com",
            projectId: "win-ad891",
            storageBucket: "win-ad891.firebasestorage.app",
            messagingSenderId: "777370829193",
            appId: "1:777370829193:web:58af7368078591e6806158"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const signupForm = document.getElementById('signup-form');
        const statusMsg = document.getElementById('status-msg');
        const submitBtn = document.getElementById('submit-btn');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Yahan balance ab 0 set kiya gaya hai
                await setDoc(doc(db, "users", user.uid), {
                    fullName: name,
                    email: email,
                    balance: 0, 
                    joinedDate: new Date().toISOString()
                });

                statusMsg.innerText = "Account Created! Redirecting...";
                statusMsg.className = "success";
                statusMsg.style.display = "block";

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (error) {
                statusMsg.innerText = "Error: " + error.message;
                statusMsg.className = "error";
                statusMsg.style.display = "block";
                submitBtn.disabled = false;
                submitBtn.innerText = "Sign Up Now";
            }
        });
    </script>
</body>
</html>
