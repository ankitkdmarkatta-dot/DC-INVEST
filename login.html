<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | DC INVEST</title>
    <style>
        :root {
            --primary: #0d2542;
            --accent: #f1c40f;
            --bg-gradient: linear-gradient(135deg, #0d2542 0%, #1a4a80 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center; justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--glass-bg);
            width: 100%; max-width: 400px;
            padding: 40px 30px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center; position: relative;
        }

        .logo-container {
            width: 80px; height: 80px; margin: 0 auto 20px;
            padding: 3px; border-radius: 50%;
            background: var(--accent); 
        }
        .logo-inner {
            width: 100%; height: 100%; background: #fff; 
            border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; 
            overflow: hidden; border: 2px solid #fff;
        }
        .logo-inner b { color: var(--primary); font-size: 24px; }

        h2 { color: var(--primary); margin-bottom: 5px; font-size: 26px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 5px; margin-left: 5px; }
        input { width: 100%; padding: 12px 15px; border: 2px solid #e1e1e1; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }

        .terms-check-area {
            display: flex; align-items: center; gap: 10px;
            margin: 15px 0 20px 5px; font-size: 13px; color: #444; text-align: left;
        }
        .terms-check-area input { width: 16px; height: 16px; cursor: pointer; }
        .read-more-link { color: var(--primary); font-weight: bold; cursor: pointer; text-decoration: underline; }

        .btn-login {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: #1a3a5f; }
        .btn-login:disabled { background: #95a5a6; cursor: not-allowed; }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 500px;
            padding: 25px; border-radius: 15px; text-align: left;
            max-height: 80vh; overflow-y: auto;
        }
        .close-modal-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 12px; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-container">
            <div class="logo-inner"><b>DC</b></div>
        </div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to DC INVEST</p>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <div class="terms-check-area">
                <input type="checkbox" id="login-terms-check">
                <label for="login-terms-check">I agree to the <span class="read-more-link" id="open-terms">Terms & Conditions</span></label>
            </div>
            <button type="submit" class="btn-login" id="login-btn" disabled>Log In</button>
        </form>

        <div style="margin-top:20px; font-size:14px; color:#666;">
            Don't have an account? <a href="signup.html" style="color:var(--primary); font-weight:bold; text-decoration:none;">Sign Up</a>
        </div>
    </div>

    <div class="modal" id="terms-modal">
        <div class="modal-content">
            <h3>DC INVEST - Terms & Conditions</h3>
            <p style="font-size: 14px; line-height: 1.6;">1. Age: 18+ only.<br>2. Security: One account per user.<br>3. Risk: Market risks apply.</p>
            <button class="close-modal-btn" id="close-terms">I Accept & Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBPpHeQPokChMANXIy78BpT8DAGZQiGPw",
            authDomain: "win-ad891.firebaseapp.com",
            projectId: "win-ad891",
            storageBucket: "win-ad891.firebasestorage.app",
            messagingSenderId: "777370829193",
            appId: "1:777370829193:web:58af7368078591e6806158"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginBtn = document.getElementById('login-btn');
        const termsCheck = document.getElementById('login-terms-check');
        const modal = document.getElementById('terms-modal');
        const openBtn = document.getElementById('open-terms');
        const closeBtn = document.getElementById('close-terms');

        termsCheck.onchange = () => { loginBtn.disabled = !termsCheck.checked; };
        openBtn.onclick = () => { modal.style.display = "flex"; };
        closeBtn.onclick = () => { modal.style.display = "none"; };
        window.onclick = (e) => { if(e.target == modal) modal.style.display = "none"; };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            loginBtn.disabled = true;
            loginBtn.innerText = "Verifying...";

            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            try {
                // 1. Auth check
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Firestore check (taaki galat user access na kar sake)
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    alert("Login Successful!");
                    window.location.href = "home.html";
                } else {
                    // Agar auth ho gaya par DB mein data nahi hai (Purana error)
                    alert("User data not found in database. Please Register again.");
                    await auth.signOut();
                    loginBtn.disabled = false;
                    loginBtn.innerText = "Log In";
                }

            } catch (err) {
                console.error(err);
                alert("Login Failed: " + err.message);
                loginBtn.disabled = false;
                loginBtn.innerText = "Log In";
            }
        };
    </script>
</body>
</html>
